			<div class="card-item card-procedure">

				<a href="/" class="card-item__img">

					<picture>

						<source srcset="/img/card-product/{{ item.img }}--150x150.webp 1x, /img/card-product/{{ item.img }}--300x300.webp 2x" type="image/webp">

						<source srcset="/img/card-product/{{ item.img }}--150x150.jpg 1x, /img/card-product/{{ item.img }}--300x300.jpg 2x">

						<img src="/img/card-product/{{ item.img }}--300x300.jpg" alt="{{ item.title }}" loading="lazy" width="150" height="150">

					</picture>

				</a>

				<address class="card-item__cat">
					{{ item.brand }}
				</address>

				<h3 class="card-item__title">
					“{{ item.title }}”
				</h3>

{% if item.label %}

				<p class="card-item__label">
					<span class="card-item__label-item">
						{{ item.label }}
					</span>
				</p>

{% endif %}

				<dl class="card-procedure__desc">

					<div class="card-procedure__desc-item">

						<dt>
							Результат:
						</dt>
						<dd>
							{{ item.result }}
						</dd>

					</div>

					<div class="card-procedure__desc-item">

						<dt>
							Курс:
						</dt>
						<dd>
							{{ item.kurs }}
						</dd>

					</div>

				</dl>

				<div class="card-item__btn">

					<a href="/" class="btn btn--outline">
						Подробнее
					</a>

				</div>

			</div>
