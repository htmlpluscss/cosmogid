				<form class="review-form form" action="/">

					<div class="review-form__fieldset">

						<h3 class="review-form__title h3">
							Пользовались данной косметикой?
						</h3>

						<p class="review-form__label">
							Вы можете быть первым, кто напишет отзыв об этом продукте или оставьте заявку, чтоб кто-то другой написал её скорее.
						</p>

						<div class="review-form__foot">

							<label class="review-form__subject review-form__btn btn btn--pink">

								<input type="radio" name="subject" class="review-form__subject-input visuallyhidden" value="Отзыв" data-type="review">

								<span class="review-form__subject-label">
									Написать отзыв
								</span>

							</label>

							<label class="review-form__subject review-form__btn btn btn--white">

								<input type="radio" name="subject" class="review-form__subject-input visuallyhidden" value="Заявка">

								<span class="review-form__subject-label">
									Оставить заявку
								</span>

							</label>

							<div class="review-form__all-request">
								Уже заявок 1 шт.
							</div>

						</div>

					</div>

					<div class="review-form__fieldset is-hide">

						<p class="review-form__legend">

							<span class="review-form__title h3" data-review="Новый отзыв к товару" data-request="Оставить заявку">
								Новый отзыв к товару
							</span>

							“Крем для рук ERICSON LABORATOIRE mini-kit acti-biotic (мини-кит) 3 шт по 10 мл”
						</p>

						<div class="review-form__row review-form__hidden-in-request">

							<div class="review-form__ratio">

								<p class="review-form__label">
									Ваша оценка
								</p>

								<div class="review-form__ratio-box">

									<input id="review-form-star-1" type="radio" name="star" value="1" required="required">
									<input id="review-form-star-2" type="radio" name="star" value="2" required="required">
									<input id="review-form-star-3" type="radio" name="star" value="3" required="required">
									<input id="review-form-star-4" type="radio" name="star" value="4" required="required">
									<input id="review-form-star-5" type="radio" name="star" value="5" required="required">

									<label for="review-form-star-1" class="review-form__ratio-star">
										Одна звезда
									</label>

									<label for="review-form-star-2" class="review-form__ratio-star">
										Две звезды
									</label>

									<label for="review-form-star-3" class="review-form__ratio-star">
										Три звезды
									</label>

									<label for="review-form-star-4" class="review-form__ratio-star">
										Четыре звезды
									</label>

									<label for="review-form-star-5" class="review-form__ratio-star">
										Пять звезд
									</label>

								</div>

							</div>

							<div class="review-form__article">

								<p class="review-form__label">
									Цвет:
								</p>

								<div class="review-form__select select">

									<select name="articleid">
										<option value="1">10.1 пепельный</option>
										<option value="2">10.2 пепельный</option>
									</select>

								</div>

							</div>

						</div>

						<label for="review-form-text" data-review="Отзыв:" data-request="Заявка:">
							Отзыв:
						</label>

						<textarea id="review-form-text" class="input review-form__input-text" name="text" required="required"></textarea>

						<label for="review-form-name">
							Ваше имя
						</label>

						<input id="review-form-name" class="input review-form__input-name" name="name" required="required">

						<button class="review-form__btn btn btn--pink">
							Отправить
						</button>

					</div>

				</form>
