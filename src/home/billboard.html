<!-- высота может быть любой, а ширина конкетная: 656 686 784 и 1140 2280
для десктопа соотношение стором может быть отличной от мобильного, т.е. загружаем две кратинки: для десктопа и для мобилы, либо crop.
для мобилы соотношение 0,5625 это 16х9
для десктопа 21х9
-->

<aside class="billboard swiper-container-style">

	<div class="center">

		<div class="billboard__box">

			<div class="swiper-container swiper-container--billboard swiper-container--loading-eager">

				<ul class="billboard__list swiper-wrapper">

{% for item in [1,2,3,4,5,6,7,8] %}

					<li class="billboard__item swiper-slide{% if loop.index > 1 %} hide{% endif %}">

						<a class="billboard__el" href="/" title="Описание ссылки">

							<picture>

								<source srcset="/img/billboard/w1140.webp 1x, /img/billboard/w2280.webp 2x" type="image/webp" media="(min-width: 768px)">
								<source srcset="/img/billboard/w784.webp" type="image/webp" media="(min-width: 376px)">
								<source srcset="/img/billboard/w686.webp" type="image/webp" media="(min-width: 361px)">
								<source srcset="/img/billboard/w656.webp" type="image/webp">

								<source srcset="/img/billboard/w1140.jpg 1x, /img/billboard/w2280.jpg 2x" media="(min-width: 768px)">
								<source srcset="/img/billboard/w784.jpg" media="(min-width: 376px)">
								<source srcset="/img/billboard/w686.jpg" media="(min-width: 361px)">
								<source srcset="/img/billboard/w656.jpg">

								<img src="/img/billboard/w2280.jpg" alt="" loading="lazy" width="328" height="160">

							</picture>

						</a>

					</li>

{% endfor %}

				</ul>

			</div>

		</div>

	</div>

</aside>
