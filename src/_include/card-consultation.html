			<div class="card-consultation">

				<h3 class="card-consultation__title">
					{{ item.title }}
				</h3>

				<p class="card-consultation__desc">
					{{ item.desc }}
				</p>

				<small class="card-consultation__brand">
					{{ item.brand }}
				</small>

				<cite class="card-consultation__autor">
					{{ item.autor }}
				</cite>

				<time datetime="2020-09-25" class="card-consultation__date">
					{{ item.date }}
				</time>

				<a href="/" class="card-consultation__link">

					<span class="card-consultation__btn">
						Подробнее
					</span>

				</a>

			</div>
