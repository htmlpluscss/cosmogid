
			<a href="/" class="card-category">

				<figure>

					<picture>

{% if item.mod == "is-rows-2" %}

						<source srcset="data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw==" media="(max-width: 1249px)">
						<source srcset="/img/card-category/{{ item.img }}--300x450.webp 1x, /img/card-category/{{ item.img }}--600x900.webp 2x" type="image/webp" media="(min-width: 1250px)">
						<source srcset="/img/card-category/{{ item.img }}--300x450.jpg 1x, /img/card-category/{{ item.img }}--600x900.jpg 2x" media="(min-width: 1250px)">
{% else %}
						<source srcset="/img/card-category/{{ item.img }}--410x205.webp 1x, /img/card-category/{{ item.img }}--820x410.webp 2x" type="image/webp" media="(min-width: 1250px)">
						<source srcset="/img/card-category/{{ item.img }}--410x205.jpg 1x, /img/card-category/{{ item.img }}--820x410.jpg 2x" media="(min-width: 1250px)">
{% endif %}

						<source srcset="/img/card-category/{{ item.img }}--380x238.webp 1x, /img/card-category/{{ item.img }}--760x476.webp 2x" type="image/webp" media="(min-width: 768px)">
						<source srcset="/img/card-category/{{ item.img }}--380x238.png 1x, /img/card-category/{{ item.img }}--760x476.png 2x" media="(min-width: 768px)">

						<source srcset="/img/card-category/{{ item.img }}--192x120.webp 1x, /img/card-category/{{ item.img }}--384x240.webp 2x" type="image/webp" media="(min-width: 361px)">
						<source srcset="/img/card-category/{{ item.img }}--192x120.png 1x, /img/card-category/{{ item.img }}--384x240.png 2x" media="(min-width: 361px)">

						<source srcset="/img/card-category/{{ item.img }}--160x100.webp 1x, /img/card-category/{{ item.img }}--320x200.webp 2x" type="image/webp">
						<source srcset="/img/card-category/{{ item.img }}--160x100.png 1x, /img/card-category/{{ item.img }}--320x200.png 2x">

						<img class="card-category__img" src="/img/card-category/{{ item.img }}--720x360.png" alt="{{ item.name | replace('<br>', '') }}" width="320" height="180" loading="lazy">

					</picture>

					<figcaption class="card-category__name">

						{{ item.name | safe }}

					</figcaption>

				</figure>

				<span class="card-category__btn">
					Купить
				</span>

			</a>
