			<div class="card-review">

				<a href="/" class="card-review__product">

					<div class="card-review__img">

						<picture>

							<source srcset="/img/card-review/{{ item.img }}--88x88.webp 1x, /img/card-review/{{ item.img }}--176x176.webp 2x" type="image/webp">

							<source srcset="/img/card-review/{{ item.img }}--88x88.jpg 1x, /img/card-review/{{ item.img }}--176x176.jpg 2x">

							<img src="/img/card-review/{{ item.img }}--176x176.jpg" alt="{{ item.name }}" width="88" height="88" loading="lazy">

						</picture>

					</div>

					<div class="card-review__info">

						<h3 class="card-review__name">
							{{ item.name }}
						</h3>

						<p class="card-review__desc">
							{{ item.desc }}
						</p>

						<p class="card-review__price">

							<b class="visuallyhidden">
								Цена
							</b>

							{{ item.price }} руб.

						</p>

					</div>

				</a>

				<blockquote class="card-review__blockquote">

					<p class="card-review__text">

						{{ item.text }}

					</p>

					<cite class="card-review__user">

						{{ item.user }}

					</cite>

				</blockquote>

			</div>
