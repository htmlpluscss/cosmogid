<!-- высота может быть любой, а ширина конкетная: 640 670 744 1140 2280
для десктопа соотношение стором может быть другой (1140 2280) т.е. загружаем две кратинки для десктопа и для мобилы
-->

	<aside class="billboard swiper-container-style">

		<div class="billboard__box">

			<div class="swiper-container swiper-container--billboard">

				<ul class="billboard__list swiper-wrapper">

{% for item in [1,2,3,4,5,6,7,8] %}

					<li class="billboard__item swiper-slide{% if loop.index > 1 %} hide{% endif %}">

						<a class="billboard__el" href="/">

							<picture>

								<source srcset="/img/billboard/w1140.webp 1x, /img/billboard/w2280.webp 2x" type="image/webp" media="(min-width: 768px)">
								<source srcset="/img/billboard/w744.webp" type="image/webp" media="(min-width: 376px)">
								<source srcset="/img/billboard/w670.webp" type="image/webp" media="(min-width: 361px)">
								<source srcset="/img/billboard/w640.webp" type="image/webp">

								<source srcset="/img/billboard/w1140.jpg 1x, /img/billboard/w2280.jpg 2x" media="(min-width: 768px)">
								<source srcset="/img/billboard/w744.jpg" media="(min-width: 376px)">
								<source srcset="/img/billboard/w670.jpg" media="(min-width: 361px)">
								<source srcset="/img/billboard/w640.jpg">

								<img src="/img/billboard/w2280.jpg" alt="" loading="lazy" width="320" height="186">

							</picture>

						</a>

					</li>

{% endfor %}

				</ul>

			</div>

		</div>

	</aside>
