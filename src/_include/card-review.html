			<div class="card-review">

				<div class="card-item card-review__product">

{% include "_include/card-item__img.html" %}

					<address class="card-item__cat">
						{{ item.brand }}
					</address>

					<h3 class="card-item__title">
						{{ item.title }}
					</h3>

					<span class="card-review__ratio card-review__ratio--{{ item.ratio }}">
						<span class="visuallyhidden">Рейтинг {{ item.ratio }} звезд</span>
					</span>

				</div>

				<blockquote class="card-review__blockquote">

					<cite class="card-review__user">

						{{ item.user }}

					</cite>

					<span class="card-review__ratio card-review__ratio--{{ item.ratio }}">
						<span class="visuallyhidden">Рейтинг {{ item.ratio }} звезд</span>
					</span>

					<p class="card-review__text">

						{{ item.text }}

					</p>

					<a href="/" class="card-review__link">
						Другие отзывы о товаре
					</a>

				</blockquote>

			</div>
