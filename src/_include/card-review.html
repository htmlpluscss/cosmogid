			<div class="card-review">

				<a href="/" class="card-review__product">

					<div class="card-review__img">

						<picture>

							<source srcset="/img/card-product/{{ item.img }}--120x120.webp 1x, /img/card-product/{{ item.img }}--240x240.webp 2x" type="image/webp">

							<source srcset="/img/card-product/{{ item.img }}--120x120.jpg 1x, /img/card-product/{{ item.img }}--240x240.jpg 2x">

							<img src="/img/card-product/{{ item.img }}--240x240.jpg" alt="{{ item.name }}" width="120" height="120" loading="lazy">

						</picture>

					</div>

					<h3 class="card-review__brand">
						{{ item.brand }}
					</h3>

					<p class="card-review__name">
						{{ item.name }}
					</p>

				</a>

				<blockquote class="card-review__blockquote">

					<cite class="card-review__user">

						{{ item.user }}

					</cite>

					<small class="card-review__city">

						{{ item.city }}

					</small>

					<span class="card-review__ratio card-review__ratio--{{ item.ratio }}">
						<span class="visuallyhidden">Рейтинг {{ item.ratio }} звезд</span>
					</span>

					<p class="card-review__text">

						{{ item.text }}

					</p>

					<a href="/" class="card-review__link">
						Другие отзывы о товаре
					</a>

				</blockquote>

			</div>
